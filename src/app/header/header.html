<div class=" border-bottom px-4 py-2 d-flex justify-content-between align-items-center shadow-sm fixed-top"
     style="height:56px; margin-left: 280px;">

  <!-- LEFT SIDE -->
  <div class="d-flex align-items-center gap-3 w-50">

    <input 
      type="text" 
      class="form-control rounded-pill px-3 w-50" 
      placeholder="Search..."
    />

    <span class="badge bg-light text-dark border px-3 py-2 fw-normal">
      &#128197; Academic Year : 2026 / 2027
    </span>

  </div>

  <!-- RIGHT SIDE -->
  <div class="d-flex align-items-center gap-2">
   

        <!-- FLAG -->
        <button class="btn btn-light border flag-btn d-flex align-items-center justify-content-center">
          <img src="https://images6.alphacoders.com/911/911295.png"
               class=""
               width="35" height="35"/>
        </button>

        <!-- PROFILE -->
        <div class="dropdown-center">
          <button class="btn btn-light profile-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <img [src]="user?.profileImage"
                 class=""
                 width="35"
                 height="35" />
          </button>

          <ul class="dropdown-menu">
            <li><a class="dropdown-item" routerLink="/home/myprofile">My Profile</a></li>
            <li><a class="dropdown-item" routerLink="/home/settings">Settings</a></li>
            <li><a class="dropdown-item" routerLink="/login">Logout</a></li>
          </ul>
        </div>
    <!-- HAMBURGER -->
    <button class="btn btn-light border" (click)="toggleMenu()">
      <i class="bi bi-list"></i>
    </button>

    <!-- SLIDING MENU -->
    <div class="header-menu" [class.open]="isMenuOpen">
      

      <!-- ACTION BUTTONS -->
      <div class="d-flex align-items-center gap-2 flex-wrap">

        <!-- ADD NEW DROPDOWN -->
        <div class="dropdown">
          <button class="btn btn-light border dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-plus-circle"></i>
          </button>

          <div class="dropdown-menu p-3" style="min-width: 250px;">
            <h3 class="dropdown-header">Add New</h3>
            <hr>

            <div class="d-flex flex-wrap gap-2">

              <a routerLink="/home/add-new/add-student" class="dashboard-card flex-fill text-center">
                <div class="icon-circle">
                  <i class="bi bi-mortarboard fs-4"></i>
                </div>
                <div>Students</div>
              </a>

              <a routerLink="/home/add-new/add-teacher" class="dashboard-card flex-fill text-center">
                <div class="icon-circle">
                  <i class="bi bi-people fs-4"></i>
                </div>
                <div>Teachers</div>
              </a>

              <a routerLink="/home/add-new/add-staf" class="dashboard-card flex-fill text-center">
                <div class="icon-circle">
                  <i class="bi bi-people-fill fs-4"></i>
                </div>
                <div>Staffs</div>
              </a>

              <div class="dashboard-card flex-fill text-center">
                <div class="icon-circle">
                  <i class="bi bi-receipt fs-4"></i>
                </div>
                <div>Invoice</div>
              </div>

            </div>
          </div>
        </div>

        <!-- OTHER ICONS -->
      <button class="btn btn-light border" (click)="toggleTheme()">
  <i class="bi" [ngClass]="isDarkMode ? 'bi-sun' : 'bi-moon'"></i>
</button>
        <button class="btn btn-light border"><i class="bi bi-bell"></i></button>
        <button class="btn btn-light border"><i class="bi bi-chat-dots"></i></button>
        <button class="btn btn-light border"><i class="bi bi-bar-chart"></i></button>
        <button class="btn btn-light border"><i class="bi bi-arrows-fullscreen"></i></button>

      </div>

    </div>

  </div>

</div>
