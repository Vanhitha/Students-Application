<div class="container mt-4">

  <div class="card shadow p-4">

    <h2 class=" mb-4">Add Staff</h2>

    <form [formGroup]="staffForm" (ngSubmit)="onSubmit()">

      <div class="row">

        <!-- Staff ID -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Staff ID</label>
          <input type="text" class="form-control" formControlName="staffId" required>
        </div>

        <!-- First Name -->
        <div class="col-md-6 mb-3">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" formControlName="firstName" required>
        </div>

        <!-- Last Name -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" formControlName="lastName" required>
        </div>

        <!-- Gender -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Gender</label>
          <select class="form-select" formControlName="gender" required>
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- DOB -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Date of Birth</label>
          <input type="date" class="form-control" formControlName="dob" required>
        </div>

        <!-- Email -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" required>
        </div>

        <!-- Phone -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" formControlName="phone" required>
        </div>

        <!-- Department -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Department</label>
          <input type="text" class="form-control" formControlName="department" required>
        </div>

        <!-- Designation -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Designation</label>
          <input type="text" class="form-control" formControlName="designation" required>
        </div>

        <!-- Joining Date -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Joining Date</label>
          <input type="date" class="form-control" formControlName="joiningDate" required>
        </div>

        <!-- Salary -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Salary</label>
          <input type="number" class="form-control" formControlName="salary" required>
        </div>

        <!-- Skills -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Skills</label>
          <input type="text" class="form-control" formControlName="skills" required>
        </div>

        <!-- Experience -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Experience (Years)</label>
          <input type="number" class="form-control" formControlName="experience" required>
        </div>

      </div>

      <!-- Address Section -->
      <h5 class="mt-3">Address</h5>

      <div formGroupName="address" class="row">

        <div class="col-md-6 mb-3">
          <label class="form-label">Current Address</label>
          <textarea class="form-control" formControlName="current" required></textarea>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Permanent Address</label>
          <textarea class="form-control" formControlName="permanent" required></textarea>
        </div>

      </div>

      <!-- Buttons -->
      <div class="d-flex justify-content-end gap-2 mt-3">

        <button type="button" class="btn btn-secondary" (click)="resetForm()">
          Reset
        </button>

        <button type="submit" class="btn btn-primary">
          Submit
        </button>

      </div>

    </form>

  </div>

</div>
