<div class="container-fluid mt-3">

  <h4 class="mb-3">Profile</h4>

  <div class="row">

    <div class="col-md-4">
    <div class="card-body">

      <!-- Title -->
      <h5 class="mb-4">Personal Information</h5>

      <!-- Profile Section -->
      <div class="d-flex align-items-center mb-4">
        <img 
          [src]="imagePreview || user?.profileImage || 'https://via.placeholder.com/80'" 
          class="rounded-circle me-3" 
          width="80" 
          height="80"
          alt="Profile"/>

        
      </div>

      <!-- Upload Box -->
      <div class="border border-2 rounded p-5 text-center"
           (click)="fileInput.click()"
           style="cursor: pointer;">

        <div class="fs-3 mb-2"><i class="bi bi-cloud-upload fs-3 mb-2"></i></div>

        <div>
          <span class="text-primary fw-semibold">Click to Upload</span>
          or drag and drop
        </div>

        <div class="small mt-1">JPG or PNG</div>
        <div class="small">(Max 450 x 450 px)</div>

        <!-- Hidden File Input -->
        <input type="file"
               #fileInput
               hidden
               accept="image/png, image/jpeg"
               (change)="onFileSelected($event)">
      </div>

      <!-- Upload Button -->
      <div class="mt-3 text-end">
        <button class="btn btn-primary btn-sm"
                (click)="uploadProfileImage()"
                [disabled]="!selectedFile">
          Upload Profile
        </button>
      </div>

    </div>
    </div>

    <div class="col-md-8">

    
      <div class="card p-3 mb-3">

        <div class="d-flex justify-content-between">
          <h6>Personal Information</h6>
          <button class="btn btn-sm btn-primary" (click)="toggleEdit()">
            {{editMode ? 'Cancel' : 'Edit'}}
          </button>
        </div>

        <div class="row mt-3">

          <div class="col-md-6">
            <label>First Name</label>
            <input class="form-control"
                   [(ngModel)]="user.firstName"
                   [disabled]="!editMode">
          </div>

          <div class="col-md-6">
            <label>Last Name</label>
            <input class="form-control"
                   [(ngModel)]="user.lastName"
                   [disabled]="!editMode">
          </div>

          <div class="col-md-6 mt-2">
            <label>Email Address</label>
            <input class="form-control"
                   [(ngModel)]="user.email"
                   disabled>
          </div>

         

          <div class="col-md-6 mt-2">
            <label>Phone Number</label>
            <input class="form-control"
                   [(ngModel)]="user.phone"
                   [disabled]="!editMode">
          </div>

        </div>

        <button *ngIf="editMode"
                class="btn btn-success btn-sm mt-3"
                (click)="save()">
          Save Changes
        </button>

      </div>

      <div class="card p-3 mb-3">

        <div class="d-flex justify-content-between">
          <h6>Address Information</h6>
          <button class="btn btn-sm btn-primary" (click)="saveAddress()">
            Save
          </button>
        </div>

        <div class="row mt-3">

          <div class="col-md-12">
            <label>Address</label>
            <input class="form-control"
                   [(ngModel)]="address.addressLine">
          </div>

          <div class="col-md-6 mt-2">
            <label>Country</label>
            <input class="form-control"
                   [(ngModel)]="address.country">
          </div>

          <div class="col-md-6 mt-2">
            <label>State / Province</label>
            <input class="form-control"
                   [(ngModel)]="address.state">
          </div>

          <div class="col-md-6 mt-2">
            <label>City</label>
            <input class="form-control"
                   [(ngModel)]="address.city">
          </div>

          <div class="col-md-6 mt-2">
            <label>Postal Code</label>
            <input class="form-control"
                   [(ngModel)]="address.postalCode">
          </div>

        </div>

      </div>

      <!-- PASSWORD -->
      <div class="card p-3">

        <div class="d-flex justify-content-between">
          <h6>Password</h6>
          <button class="btn btn-warning btn-sm"
                  (click)="changePassword()">
            Change
          </button>
        </div>

        <div class="mt-3">
          <label>Current Password</label>
          <input type="password" class="form-control">
        </div>

      </div>

    </div>

  </div>

</div>
